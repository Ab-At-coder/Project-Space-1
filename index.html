<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FCC [Project-1 : Quiz Game]</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Initial Screen -->
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Let's test how much of a exceptional brain you've got!!</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <!-- Quiz screen -->
      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Here come the Questions</h2>

          <div class="quiz-info">
            <p>Question <span id="current-question">1</span> of 5</p>

            <p>Score : <span id="score">0</span></p>
          </div>
        </div>

        <div class="answers-container" id="answers-container">
          <!-- Answer buttons will come here -->
        </div>

        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <!-- Result Screen -->
      <div class="screen" id="result-screen">
        <h1>Quiz Results</h1>

        <div class="result-info">
          <p>You scored <span id="final-score">0</span> out of 5</p>
          <div id="result-message">Good job!</div>
        </div>

        <button id="restart-btn">Restart Quiz</button>
      </div>
    </div>
  </body>
</html>
